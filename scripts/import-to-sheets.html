const log = document.getElementById('log');
const btn = document.getElementById('btn');

function write(cls, msg) {
  const s = document.createElement('span');
  s.className = cls;
  s.textContent = msg + '\n';
  log.appendChild(s);
}

async function run() {
  btn.disabled = true;
  log.innerHTML = '';
  write('info', `Sending ${ROWS.length} rows to Google Sheets…\n`);

  let ok = 0, fail = 0;

  for (let i = 0; i < ROWS.length; i++) {
    const row = ROWS[i];
    const label = row.name || `row ${i + 1}`;
    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(row),
      });
      if (res.ok) {
        ok++;
        write('ok', `  ✓ [${i+1}/${ROWS.length}] ${label}`);
      } else {
        fail++;
        const txt = await res.text().catch(() => '');
        write('fail', `  ✗ [${i+1}/${ROWS.length}] ${label} — HTTP ${res.status}`);
        if (txt) write('fail', `      ${txt.replace(/<[^>]+>/g,'').trim().slice(0, 200)}`);
      }
    } catch (err) {
      fail++;
      write('fail', `  ✗ [${i+1}/${ROWS.length}] ${label} — ${err.message}`);
    }
    await new Promise(r => setTimeout(r, 500));
  }

  write('info', `\nDone — ${ok} imported, ${fail} failed`);
  btn.disabled = false;
}
</script>
